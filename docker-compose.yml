services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: biomoneta-timescaledb
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: biomoneta_postgres
      POSTGRES_DB: biomoneta_air
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - biomoneta_net

  backend:
    build: .
    container_name: biomoneta-backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: biomoneta_postgres
      DB_NAME: biomoneta_air
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - biomoneta_net

volumes:
  timescale_data:

networks:
  biomoneta_net:
    driver: bridge